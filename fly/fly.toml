# Fly.io Machine config for the Tesseract OCR HTTP service.
#
# Pricing math (anchored against 2026-05-02 invoice — fly/README.md
# has the bill-derivation steps):
#   shared-cpu-2x + 1 GB RAM ≈ $0.0143/hr per Machine
#     (CPU $0.00000242/sec + 0.5 GB additional RAM × $0.00000312/sec)
#   For 12,930 ACÓRDÃOs at ~5 sec OCR each, ~30 Machines in parallel:
#     compute = 64,650 Machine-sec ≈ 18 Machine-hr × $0.0143 = $0.26
#     wall    = ~36 min start-to-finish
#
# Region: gru (São Paulo) — closest to STF traffic origin and to
# minimize bytes-shipping latency from a São Paulo-hosted client.
# Override per-deploy via `flyctl deploy --regions <code>`.

app = "judex-ocr-tesseract-arcos"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # Pin OpenMP to 1 thread per tesseract subprocess. Each page is OCRed
  # in its own subprocess and we parallelize *across* pages via the
  # server's ThreadPoolExecutor — letting OpenMP also fan out underneath
  # would oversubscribe the 2 vCPUs (n_workers × OMP_threads). Set here
  # so the env is in scope before uvicorn imports anything.
  OMP_NUM_THREADS = "1"
  # Where libtesseract finds *.traineddata. Debian Bookworm's
  # tesseract-ocr-por package installs to /usr/share/tesseract-ocr/5/
  # tessdata/. Without this, PyTessBaseAPI(lang="por") raises:
  #   "Failed to init API, possibly an invalid tessdata path: ./"
  TESSDATA_PREFIX = "/usr/share/tesseract-ocr/5/tessdata/"

[http_service]
  internal_port = 8080
  force_https = true
  # auto_start: idle Machines wake on incoming HTTPS request (~5 s cold).
  # auto_stop:  Machines power down after `min_machines_running` is met.
  # Together: pay only for active OCR seconds; idle = $0.
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

# Per-Machine resource shape. Memory floor derivation (200 dpi A4):
#   steady-state (in-process tesserocr model):
#     Python/uvicorn 180 + Pillow 80 + glibc/kernel 50 = 310 MB
#     per-worker PyTessBaseAPI: 2 workers × 100 MB = 200 MB
#                                          subtotal = 510 MB
#   per-chunk raster: 16 pages × 11 MB = 176 MB (capped by chunk size)
#   peak working set: ~686 MB
# 1 GB total = 512 MB included + 512 MB additional billed; ~338 MB
# headroom over peak (~33%). Headroom went up vs the pytesseract era:
# the LSTM model is now resident once-per-worker in our process heap
# instead of being re-mmap'd by transient tesseract subprocesses, so
# there's no transient-subprocess RAM stacked on top of the chunk.
# Outliers > 2 MB compressed are skipped pre-flight via
# tesseract_fly.OutlierPdfError, so the cluster never sees PDFs that
# would exceed the chunked memory model.
#
# Memory shape evolution on this app:
#   4 GB (orig) — upfront-rasterize design needed ~2.3 GB for the
#                 295-page outlier; 4 GB was a safe ceiling.
#   2 GB        — landed with chunked rasterize (chunk=32). Cut the
#                 RAM line item ~57%.
#   1 GB (now)  — landed with chunk=16 + outlier-skip. Cuts the RAM
#                 line another ~67% (from 1.5 GB additional → 0.5 GB).
[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
